services:
  h-dashboard:
    build: .
    container_name: h-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3000"
    environment:
      - HONCHO_BASE_URL=http://honcho-api-1:8000
      - AUTH_SECRET=${AUTH_SECRET}
      - DASHBOARD_USER=${DASHBOARD_USER}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
    networks:
      - honcho_default

networks:
  honcho_default:
    external: true
