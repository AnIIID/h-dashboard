<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Gallery — Login</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1>AI Gallery</h1>
        <p class="login-subtitle">KI-generierte Bildergalerie</p>
      </div>
      <form id="loginForm" autocomplete="off">
        <div class="input-group">
          <input
            type="password"
            id="password"
            placeholder="Passwort eingeben"
            autofocus
            required
          >
        </div>
        <button type="submit" class="btn btn-primary btn-full">Eintreten</button>
        <p id="loginError" class="error-text" style="display:none;"></p>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');
      errorEl.style.display = 'none';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/gallery';
        } else {
          errorEl.textContent = data.error || 'Falsches Passwort';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'Verbindungsfehler';
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
