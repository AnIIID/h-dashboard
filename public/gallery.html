<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Gallery</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="gallery-page">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <button id="toggleSidebar" class="btn-icon" title="Filter">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="16" y2="12"/><line x1="4" y1="18" x2="12" y2="18"/>
        </svg>
      </button>
      <h1 class="header-title">AI Gallery</h1>
    </div>
    <div class="header-center">
      <div class="search-box">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Suchen (Prompt, Tags, Notizen)...">
      </div>
    </div>
    <div class="header-right">
      <span id="guestPwDisplay" class="guest-pw-badge admin-only"></span>
      <div class="stats-badge" id="statsDisplay"></div>
      <button id="logoutBtn" class="btn btn-ghost" title="Abmelden">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-content">
      <h3 class="sidebar-title">Filter</h3>

      <!-- Sortierung -->
      <div class="filter-group">
        <label class="filter-label">Sortierung</label>
        <select id="sortSelect" class="filter-select">
          <option value="newest">Neueste zuerst</option>
          <option value="oldest">Älteste zuerst</option>
          <option value="score">Höchster Score</option>
          <option value="brand">Nach Brand</option>
        </select>
      </div>

      <!-- Brand -->
      <div class="filter-group">
        <label class="filter-label">Brand</label>
        <select id="brandFilter" class="filter-select">
          <option value="">Alle</option>
        </select>
      </div>

      <!-- Modell -->
      <div class="filter-group">
        <label class="filter-label">Modell</label>
        <select id="modelFilter" class="filter-select">
          <option value="">Alle</option>
        </select>
      </div>

      <!-- Score Range -->
      <div class="filter-group">
        <label class="filter-label">Score: <span id="scoreRangeLabel">0 — 100</span></label>
        <div class="range-inputs">
          <input type="range" id="scoreMin" min="0" max="100" value="0" class="range-slider">
          <input type="range" id="scoreMax" min="0" max="100" value="100" class="range-slider">
        </div>
      </div>

      <!-- Tags -->
      <div class="filter-group">
        <label class="filter-label">Tags</label>
        <div id="tagsList" class="tags-filter-list"></div>
      </div>

      <button id="resetFilters" class="btn btn-ghost btn-full" style="margin-top:1rem;">Filter zurücksetzen</button>
    </div>
  </aside>

  <!-- Main Content -->
  <main id="mainContent" class="main-content">
    <div id="galleryGrid" class="gallery-grid"></div>

    <!-- Leer-Zustand -->
    <div id="emptyState" class="empty-state" style="display:none;">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="1">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <p>Keine Bilder gefunden</p>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="pagination" style="display:none;">
      <button id="prevPage" class="btn btn-ghost">&laquo; Zurück</button>
      <span id="pageInfo" class="page-info"></span>
      <button id="nextPage" class="btn btn-ghost">Weiter &raquo;</button>
    </div>
  </main>

  <!-- Detail Modal -->
  <div id="detailModal" class="modal" style="display:none;">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="detail-layout">
        <div class="detail-image-wrap">
          <img id="detailImage" src="" alt="">
        </div>
        <div class="detail-info">
          <div class="detail-header">
            <span id="detailBrand" class="brand-badge"></span>
            <span id="detailVersion" class="version-badge"></span>
          </div>
          <div class="detail-section admin-only">
            <h4>Bewertung</h4>
            <div class="score-editor">
              <input type="range" id="scoreSlider" min="0" max="100" value="0" class="score-slider">
              <span id="scoreValue" class="score-value">0</span>
              <button id="scoreSave" class="btn btn-primary btn-sm">Speichern</button>
            </div>
          </div>
          <div class="detail-section">
            <h4>Prompt</h4>
            <p id="detailPrompt" class="detail-prompt-text"></p>
          </div>
          <div class="detail-section">
            <h4>Modell</h4>
            <p id="detailModel"></p>
          </div>
          <div class="detail-section">
            <h4>Tags</h4>
            <div id="detailTags" class="detail-tags"></div>
          </div>
          <div class="detail-section">
            <h4>Notizen</h4>
            <p id="detailNotes" class="detail-notes-text"></p>
          </div>
          <div class="detail-section">
            <h4>Erstellt</h4>
            <p id="detailDate"></p>
          </div>

          <!-- Genealogie -->
          <div id="genealogySection" class="detail-section" style="display:none;">
            <h4>Prompt-Genealogie</h4>
            <div id="genealogyContent" class="genealogy"></div>
          </div>

          <div class="detail-actions admin-only">
            <button id="favBtn" class="btn btn-ghost btn-fav-detail">&#9733; Favorit</button>
            <button id="deleteBtn" class="btn btn-danger">Löschen</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
